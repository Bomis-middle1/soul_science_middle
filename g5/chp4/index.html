<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mona's Path – Change Adventure (Clear)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #020617;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: #0f172a;
    }

    /* Splash screen */
    .splash-screen {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, #0ea5e9 0%, #0369a1 40%, #022c22 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.6s ease-out;
    }
    .splash-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .splash-content {
      text-align: center;
      color: #e0f2fe;
    }
    .splash-content img {
      max-width: 260px;
      width: 80%;
      height: auto;
      margin-bottom: 12px;
      animation: logoFloat 2s ease-in-out infinite;
    }
    .splash-title {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 1px;
      text-shadow: 0 0 12px rgba(15,23,42,0.9);
    }
    @keyframes logoFloat {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .game-shell {
      max-width: 1000px;
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 24px;
      overflow: hidden;
      border: 3px solid #22c55e;
      box-shadow: 0 0 40px rgba(34,197,94,0.7);
      position: relative;
      background: #020617;
      opacity: 0;
      transition: opacity 0.7s ease-in;
    }
    .game-shell.visible { opacity: 1; }

    .top-strip {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 10px;
      font-size: 11px;
      color: #e5e7eb;
      background: linear-gradient(to right, #0f172a, #1e3a8a, #0f766e);
      z-index: 5;
    }

    .top-strip-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .top-title {
      font-size: 12px;
      font-weight: bold;
    }
    .top-instruction {
      font-size: 11px;
      opacity: 0.9;
    }

    .top-strip-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .meter {
      width: 100px;
      height: 8px;
      border-radius: 999px;
      background: rgba(15,23,42,0.8);
      overflow: hidden;
      border: 1px solid rgba(148,163,184,0.8);
    }
    .meter-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #f97316, #22c55e);
      transition: width 0.4s ease-out;
    }

    .world-wrap {
      position: absolute;
      inset: 42px 0 0 0;
      display: flex;
      flex-direction: column;
    }

    .scene {
      position: relative;
      flex: 1;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
    }

    .sky {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, #020617, #111827);
      transition: background 0.8s ease-out;
    }

    .sky.old { background: linear-gradient(to top, #020617, #111827); }
    .sky.bus { background: linear-gradient(to top, #0f172a, #1d4ed8); }
    .sky.new { background: linear-gradient(to top, #022c22, #22c55e); }

    .ground {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 90px;
      background: linear-gradient(to top, #4b5563, #6b7280);
      box-shadow: 0 -10px 20px rgba(15,23,42,0.9);
      transition: background 0.8s ease-out;
    }
    .ground.bus {
      background: linear-gradient(to top, #14532d, #16a34a);
    }
    .ground.new {
      background: linear-gradient(to top, #166534, #22c55e);
    }

    .track {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 42px;
      height: 6px;
      background: rgba(15,23,42,0.85);
      opacity: 0.9;
    }

    .world-content {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 16px 24px;
      pointer-events: none;
    }

    .label-col {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .place-label {
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(15,23,42,0.8);
      color: #e5e7eb;
      font-size: 11px;
      border: 1px solid rgba(148,163,184,0.7);
    }

    /* Simple icons */
    .icon-block {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      background: rgba(15,23,42,0.8);
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      box-shadow: 0 4px 12px rgba(15,23,42,0.9);
      font-size: 28px;
    }
    .icon-text {
      font-size: 10px;
    }

    .icon-row {
      display: flex;
      gap: 10px;
      pointer-events: none;
    }

    /* Mona */
    .mona {
      position: absolute;
      bottom: 50px;
      left: 70px;
      width: 52px;
      height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: transform 0.25s ease-out;
      pointer-events: none;
    }

    .mona-head {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 20%, #fee2e2 0, #fecaca 60%);
      border: 2px solid rgba(148,163,184,0.8);
      position: relative;
    }
    .mona-face-old::before,
    .mona-face-old::after,
    .mona-face-mid::before,
    .mona-face-mid::after,
    .mona-face-new::before,
    .mona-face-new::after {
      content: "";
      position: absolute;
      top: 14px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #0f172a;
    }
    .mona-face-old::before,
    .mona-face-mid::before,
    .mona-face-new::before { left: 9px; }
    .mona-face-old::after,
    .mona-face-mid::after,
    .mona-face-new::after { right: 9px; }

    .mona-face-old span {
      position: absolute;
      bottom: 6px;
      left: 50%;
      width: 18px;
      height: 8px;
      border-radius: 999px;
      border: 2px solid #0f172a;
      border-top: none;
      transform: translateX(-50%) rotate(180deg);
    }

    .mona-face-mid span {
      position: absolute;
      bottom: 7px;
      left: 50%;
      width: 18px;
      height: 6px;
      border-radius: 999px;
      border-bottom: 2px solid #0f172a;
      transform: translateX(-50%);
    }

    .mona-face-new span {
      position: absolute;
      bottom: 6px;
      left: 50%;
      width: 20px;
      height: 8px;
      border-radius: 999px;
      border: 2px solid #0f172a;
      border-top: none;
      transform: translateX(-50%);
    }

    .mona-body {
      width: 30px;
      height: 36px;
      border-radius: 14px 14px 6px 6px;
      background: linear-gradient(to bottom, #6366f1, #22c55e);
      box-shadow: 0 4px 10px rgba(15,23,42,0.8);
    }

    .step-indicator {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
    }
    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1px solid rgba(148,163,184,0.7);
      background: rgba(15,23,42,0.7);
    }
    .step-dot.active {
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34,197,94,0.9);
    }

    /* Choice bubbles */
    .choices {
      position: absolute;
      bottom: 90px;
      right: 28px;
      display: flex;
      gap: 10px;
      z-index: 3;
    }
    .choice {
      width: 64px;
      height: 64px;
      border-radius: 999px;
      background: rgba(15,23,42,0.9);
      border: 2px solid rgba(148,163,184,0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(15,23,42,0.9);
      transition: transform 0.1s ease-out, box-shadow 0.1s ease-out;
    }
    .choice:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(15,23,42,0.9);
    }
    .choice-label {
      font-size: 10px;
      color: #e5e7eb;
      margin-top: 2px;
    }

    .bottom-text {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      font-size: 12px;
      color: #e5e7eb;
      text-align: center;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(15,23,42,0.85);
      border: 1px solid rgba(148,163,184,0.7);
    }

    /* End overlay */
    .end-screen {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(34,197,94,0.9), rgba(15,23,42,0.98));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #f9fafb;
      text-align: center;
      gap: 8px;
      z-index: 10;
    }
    .end-title {
      font-size: 22px;
    }
    .end-sub {
      font-size: 13px;
      opacity: 0.95;
      max-width: 320px;
    }
    .end-badge {
      font-size: 42px;
    }
    .end-btn {
      margin-top: 8px;
      padding: 7px 16px;
      font-size: 12px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #f9fafb;
      box-shadow: 0 3px 10px rgba(15,23,42,0.9);
    }
    .end-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 14px rgba(15,23,42,1);
    }

    @media (max-width: 768px) {
      .top-title { font-size: 11px; }
      .top-instruction { font-size: 10px; }
      .bottom-text { font-size: 11px; }
    }
  </style>
</head>
<body>
  <!-- Innovine splash -->
  <div class="splash-screen" id="splashScreen">
    <div class="splash-content">
      <img src="assets/innovine-logo.png" alt="Innovine Logo" onerror="this.style.display='none'" />
      <div class="splash-title">Loading Mona's Path...</div>
    </div>
  </div>

  <div class="game-shell" id="gameShell">
    <div class="top-strip">
      <div class="top-strip-left">
        <div class="top-title">Mona's Path – Change Adventure</div>
        <div class="top-instruction" id="topInstruction">
          Mona is starting a new school. Tap an emoji to choose her reaction.
        </div>
      </div>
      <div class="top-strip-right">
        <span>Old → New</span>
        <div class="meter">
          <div class="meter-fill" id="meterFill"></div>
        </div>
        <span>🌱</span>
      </div>
    </div>

    <div class="world-wrap">
      <div class="scene">
        <div class="sky old" id="sky"></div>
        <div class="ground" id="ground"></div>
        <div class="track"></div>

        <div class="world-content">
          <div class="label-col">
            <div class="place-label" id="placeLabelLeft">OLD SCHOOL</div>
            <div class="icon-block" id="leftIcon1">
              <span>🏫</span>
              <span class="icon-text">CLASSROOM</span>
            </div>
            <div class="icon-block" id="leftIcon2">
              <span>🌳</span>
              <span class="icon-text">LUNCH TREE</span>
            </div>
          </div>

          <div class="label-col" style="align-items:flex-end;">
            <div class="place-label" id="placeLabelRight">NEW SCHOOL</div>
            <div class="icon-row" id="rightIcons">
              <div class="icon-block">
                <span>👧</span>
                <span class="icon-text">NEW FRIENDS</span>
              </div>
              <div class="icon-block">
                <span>🏀</span>
                <span class="icon-text">SPORTS</span>
              </div>
              <div class="icon-block">
                <span>🎨</span>
                <span class="icon-text">ART CLASS</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Mona -->
        <div class="mona" id="mona">
          <div class="mona-head mona-face-old" id="monaHead">
            <span></span>
          </div>
          <div class="mona-body"></div>
        </div>

        <div class="step-indicator" id="stepDots"></div>

        <!-- choice bubbles -->
        <div class="choices">
          <div class="choice" id="choiceLeft">
            <span>😟</span>
            <span class="choice-label">STAY SAD</span>
          </div>
          <div class="choice" id="choiceRight">
            <span>✨</span>
            <span class="choice-label">TRY NEW</span>
          </div>
        </div>

        <div class="bottom-text" id="bottomText">
          Step 1 of 4 · Tap 😟 to stay stuck or ✨ to try something new.
        </div>
      </div>
    </div>
  </div>

  <script>
    // Splash & container
    const splashScreen = document.getElementById("splashScreen");
    const gameShell = document.getElementById("gameShell");
    setTimeout(() => {
      splashScreen.classList.add("hidden");
      gameShell.classList.add("visible");
    }, 2200);

    // Sounds
    const goodSound = new Audio("assets/correct.mp3");
    const celebrationSound = new Audio("assets/freesound_community-claps-44774.mp3");
    goodSound.volume = 0.8;
    celebrationSound.volume = 0.8;
    function playGood(){ goodSound.currentTime = 0; goodSound.play().catch(()=>{}); }
    function playCelebrate(){ celebrationSound.currentTime = 0; celebrationSound.play().catch(()=>{}); }

    const meterFill = document.getElementById("meterFill");
    const skyEl = document.getElementById("sky");
    const groundEl = document.getElementById("ground");
    const mona = document.getElementById("mona");
    const monaHead = document.getElementById("monaHead");
    const stepDots = document.getElementById("stepDots");
    const choiceLeft = document.getElementById("choiceLeft");
    const choiceRight = document.getElementById("choiceRight");
    const topInstruction = document.getElementById("topInstruction");
    const bottomText = document.getElementById("bottomText");
    const placeLabelLeft = document.getElementById("placeLabelLeft");
    const placeLabelRight = document.getElementById("placeLabelRight");

    // Simple steps with short on-screen text cues.[file:38]
    const steps = [
      {
        world: "old",
        monaX: 60,
        face: "old",
        top: "Mona is at her old school. She feels sad about leaving.",
        bottom: "Step 1 · Tap ✨ if she will try one new thing at the new school."
      },
      {
        world: "bus",
        monaX: 260,
        face: "mid",
        top: "Mona is on the way to the new city.",
        bottom: "Step 2 · Tap ✨ if she will look out for good things on the way."
      },
      {
        world: "new",
        monaX: 460,
        face: "mid",
        top: "Mona reaches her new school. Everything looks different.",
        bottom: "Step 3 · Tap ✨ if she will say yes to a new friend or game."
      },
      {
        world: "new",
        monaX: 640,
        face: "new",
        top: "Mona has tried some new things.",
        bottom: "Step 4 · Tap ✨ if she can see change as a new story, not the end."
      }
    ];

    let currentStep = 0;
    let progress = 0; // positive choices

    function renderDots(){
      stepDots.innerHTML = "";
      steps.forEach((_, i) => {
        const dot = document.createElement("div");
        dot.className = "step-dot" + (i === currentStep ? " active" : "");
        stepDots.appendChild(dot);
      });
    }

    function setWorld(world){
      if(world === "old"){
        skyEl.className = "sky old";
        groundEl.className = "ground";
        placeLabelLeft.textContent = "OLD SCHOOL";
        placeLabelRight.textContent = "NEW SCHOOL";
      } else if(world === "bus"){
        skyEl.className = "sky bus";
        groundEl.className = "ground bus";
        placeLabelLeft.textContent = "ON THE WAY";
        placeLabelRight.textContent = "NEW CITY";
      } else {
        skyEl.className = "sky new";
        groundEl.className = "ground new";
        placeLabelLeft.textContent = "OLD MEMORIES";
        placeLabelRight.textContent = "NEW SCHOOL";
      }
    }

    function setFace(type){
      monaHead.className = "mona-head";
      if(type === "old"){
        monaHead.classList.add("mona-face-old");
      } else if(type === "mid"){
        monaHead.classList.add("mona-face-mid");
      } else {
        monaHead.classList.add("mona-face-new");
      }
    }

    function updateStepText(){
      const step = steps[currentStep];
      topInstruction.textContent = step.top;
      bottomText.textContent = step.bottom;
    }

    function updateVisual(){
      const step = steps[currentStep];
      setWorld(step.world);
      setFace(step.face);
      mona.style.transform = "translateX(" + step.monaX + "px)";
      renderDots();
      updateStepText();
    }

    function applyChoice(kind){
      const step = steps[currentStep];
      if(kind === "open"){ // ✨
        playGood();
        progress += 25;
        if(progress > 100) progress = 100;
        // upgrade face to happier from mid steps on
        if(currentStep >= 2){
          step.face = "new";
        }
      } else {
        // 😟
        progress = Math.max(progress - 5, 0);
      }

      meterFill.style.width = progress + "%";

      if(currentStep < steps.length - 1){
        currentStep++;
        updateVisual();
      } else {
        setTimeout(showEndScreen, 1000);
      }
    }

    function showEndScreen(){
      playCelebrate();
      const end = document.createElement("div");
      end.className = "end-screen";

      const openEnough = progress >= 60;
      const title = openEnough ? "New Chances Unlocked" : "Still Missing the Old";
      const badge = openEnough ? "🌈" : "🌥️";
      const sub = openEnough
        ? "Mona still remembers her old school, but she has found new friends and joys too. Change can open new doors."
        : "Mona is still holding tightly to the past. Taking small steps to try new things can help change feel like a new beginning.";

      end.innerHTML = `
        <div class="end-badge">${badge}</div>
        <div class="end-title">${title}</div>
        <div class="end-sub">${sub}</div>
        <button class="end-btn" id="playAgainBtn">Play Again</button>
      `;
      gameShell.appendChild(end);
      document.getElementById("playAgainBtn").addEventListener("click", () => location.reload());
    }

    choiceLeft.addEventListener("click", () => applyChoice("hold"));
    choiceRight.addEventListener("click", () => applyChoice("open"));

    // Optional keyboard support
    window.addEventListener("keydown", (e) => {
      if(e.key === "ArrowLeft"){ applyChoice("hold"); }
      if(e.key === "ArrowRight"){ applyChoice("open"); }
    });

    // Init
    updateVisual();
  </script>
</body>
</html>
